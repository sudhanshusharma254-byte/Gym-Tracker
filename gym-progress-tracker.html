.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;gym-progress-tracker&quot; aria-label=&quot;Gym progress tracker&quot;&gt;
  &lt;style&gt;
    #gym-progress-tracker { color: var(--foreground); }

    #gym-progress-tracker .view[hidden] { display:none; }
    #gym-progress-tracker .session-meta { display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap; margin-bottom:1rem; }
    #gym-progress-tracker .checkin { display:flex; align-items:center; gap:.5rem; }
    #gym-progress-tracker .exercise-list { display:grid; gap:.75rem; }
    #gym-progress-tracker .exercise { display:grid; grid-template-columns:minmax(0,1fr) 8rem 7rem; align-items:end; gap:.75rem; padding:.75rem 0; border-bottom:1px solid var(--border); }
    #gym-progress-tracker .exercise:last-child { border-bottom:0; }
    #gym-progress-tracker .exercise-name { font-weight:500; }
    #gym-progress-tracker .exercise small { display:block; margin-top:.2rem; }
    #gym-progress-tracker .section-label { margin:1.5rem 0 .75rem; }
    #gym-progress-tracker .chart-wrap { position:relative; margin-top:1rem; }
    #gym-progress-tracker .chart { width:100%; height:auto; display:block; }
    #gym-progress-tracker .calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:.35rem; }
    #gym-progress-tracker .weekday { text-align:center; color:var(--muted-foreground); }
    #gym-progress-tracker .day { min-height:2.5rem; display:flex; justify-content:center; align-items:center; border:1px solid var(--border); background:var(--background); }
    #gym-progress-tracker .day.scheduled { background:color-mix(in srgb, var(--viz-series-1) 15%, var(--background)); }
    #gym-progress-tracker .day.attended { background:var(--viz-series-1); color:var(--primary-foreground); border-color:var(--viz-series-1); }
    #gym-progress-tracker .chart-label { fill:var(--muted-foreground); font-size:11px; }
    #gym-progress-tracker .chart-line { fill:none; stroke:var(--viz-series-1); stroke-width:2.5; }
    #gym-progress-tracker .chart-point { fill:var(--viz-series-1); }
    #gym-progress-tracker .chart-grid { stroke:var(--border); stroke-width:1; }
    #gym-progress-tracker .legend { display:flex; gap:1rem; flex-wrap:wrap; margin-top:.75rem; }
    #gym-progress-tracker .legend span { display:flex; gap:.4rem; align-items:center; }
    #gym-progress-tracker .swatch { width:.8rem; height:.8rem; display:inline-block; background:color-mix(in srgb, var(--viz-series-1) 15%, var(--background)); border:1px solid var(--border); }
    #gym-progress-tracker .swatch.attended { background:var(--viz-series-1); border-color:var(--viz-series-1); }
    #gym-progress-tracker .reminder-status { margin-top:.75rem; }
    #gym-progress-tracker .notice { margin:.75rem 0; }
    @media (max-width: 520px) { #gym-progress-tracker .exercise { grid-template-columns:1fr 1fr; } #gym-progress-tracker .exercise &gt; :first-child { grid-column:1 / -1; } }
  &lt;/style&gt;

  &lt;div class=&quot;app-header&quot;&gt;
    &lt;div&gt;&lt;h2&gt;Gym Tracker&lt;/h2&gt;&lt;div class=&quot;text-muted&quot;&gt;Consistency and progressive overload&lt;/div&gt;&lt;/div&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; id=&quot;settings-button&quot; aria-expanded=&quot;false&quot;&gt;Reminder settings&lt;/button&gt;
  &lt;/div&gt;

  &lt;section class=&quot;card&quot; id=&quot;settings&quot; hidden aria-label=&quot;Reminder settings&quot;&gt;
    &lt;div class=&quot;viz-controls&quot;&gt;
      &lt;label class=&quot;form-label&quot;&gt;Gym time
        &lt;input class=&quot;form-control&quot; id=&quot;gym-time&quot; type=&quot;time&quot; value=&quot;18:00&quot;&gt;
      &lt;/label&gt;
      &lt;div&gt;&lt;span class=&quot;form-label&quot;&gt;30-minute reminder&lt;/span&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; id=&quot;enable-reminder&quot;&gt;Enable reminder&lt;/button&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;text-muted reminder-status&quot; id=&quot;reminder-status&quot;&gt;Set your gym time, then enable reminders in this browser.&lt;/div&gt;
  &lt;/section&gt;

  &lt;div class=&quot;tabs&quot; role=&quot;tablist&quot; aria-label=&quot;Tracker sections&quot;&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; role=&quot;tab&quot; id=&quot;log-tab&quot; aria-selected=&quot;true&quot; aria-controls=&quot;log-view&quot;&gt;Log&lt;/button&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; role=&quot;tab&quot; id=&quot;me-tab&quot; aria-selected=&quot;false&quot; aria-controls=&quot;me-view&quot;&gt;Me&lt;/button&gt;
  &lt;/div&gt;

  &lt;section id=&quot;log-view&quot; class=&quot;view&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;log-tab&quot;&gt;
    &lt;div class=&quot;session-meta&quot;&gt;
      &lt;div&gt;&lt;h3 id=&quot;today-title&quot;&gt;Today&lt;/h3&gt;&lt;div class=&quot;text-muted&quot; id=&quot;today-subtitle&quot;&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;label class=&quot;checkin form-check&quot;&gt;&lt;input class=&quot;form-check-input&quot; id=&quot;attendance&quot; type=&quot;checkbox&quot;&gt;&lt;span class=&quot;form-check-label&quot;&gt;I trained today&lt;/span&gt;&lt;/label&gt;
    &lt;/div&gt;
    &lt;div class=&quot;notice text-muted&quot; id=&quot;rest-note&quot; hidden&gt;Rest day: stretching and walking. Check in only if you trained.&lt;/div&gt;
    &lt;div class=&quot;exercise-list&quot; id=&quot;exercise-list&quot; aria-live=&quot;polite&quot;&gt;&lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;me-view&quot; class=&quot;view&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;me-tab&quot; hidden&gt;
    &lt;div class=&quot;viz-grid&quot; id=&quot;stats-grid&quot;&gt;
      &lt;div class=&quot;card viz-stat&quot;&gt;&lt;div class=&quot;text-muted&quot;&gt;This week&lt;/div&gt;&lt;div class=&quot;viz-stat-value&quot; id=&quot;week-consistency&quot;&gt;0 / 6&lt;/div&gt;&lt;div class=&quot;text-muted&quot;&gt;planned sessions completed&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;card viz-stat&quot;&gt;&lt;div class=&quot;text-muted&quot;&gt;Current streak&lt;/div&gt;&lt;div class=&quot;viz-stat-value&quot; id=&quot;streak&quot;&gt;0&lt;/div&gt;&lt;div class=&quot;text-muted&quot;&gt;successful gym days&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;card viz-stat&quot;&gt;&lt;div class=&quot;text-muted&quot;&gt;Top lift change&lt;/div&gt;&lt;div class=&quot;viz-stat-value&quot; id=&quot;top-lift&quot;&gt;-&lt;/div&gt;&lt;div class=&quot;text-muted&quot;&gt;latest logged weight&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;h3 class=&quot;section-label&quot;&gt;Consistency&lt;/h3&gt;
    &lt;div class=&quot;text-muted&quot; id=&quot;month-label&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;calendar&quot; id=&quot;calendar&quot; role=&quot;img&quot; aria-label=&quot;Monthly consistency calendar&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;legend text-small&quot;&gt;&lt;span&gt;&lt;i class=&quot;swatch&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; Planned&lt;/span&gt;&lt;span&gt;&lt;i class=&quot;swatch attended&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; Trained&lt;/span&gt;&lt;/div&gt;

    &lt;h3 class=&quot;section-label&quot;&gt;Progressive overload&lt;/h3&gt;
    &lt;label class=&quot;form-label&quot;&gt;Exercise
      &lt;select class=&quot;form-select&quot; id=&quot;exercise-select&quot; aria-label=&quot;Select exercise for progress chart&quot;&gt;&lt;/select&gt;
    &lt;/label&gt;
    &lt;div class=&quot;chart-wrap&quot; id=&quot;chart-wrap&quot;&gt;
      &lt;svg class=&quot;chart&quot; id=&quot;progress-chart&quot; viewBox=&quot;0 0 650 250&quot; role=&quot;img&quot; aria-labelledby=&quot;chart-title chart-desc&quot;&gt;
        &lt;title id=&quot;chart-title&quot;&gt;Weight progression&lt;/title&gt;&lt;desc id=&quot;chart-desc&quot;&gt;Log weights in the Log section to see your progression.&lt;/desc&gt;
        &lt;g id=&quot;chart-content&quot;&gt;&lt;/g&gt;
      &lt;/svg&gt;
      &lt;div class=&quot;text-muted text-small&quot; id=&quot;chart-empty&quot;&gt;Log your first weight to see progress here.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;script&gt;
  (() =&gt; {
    const root = document.getElementById(&#x27;gym-progress-tracker&#x27;);
    const plan = {
      1:{name:&#x27;Push&#x27;, items:[[&#x27;Bench Press&#x27;,&#x27;4 x 5-6&#x27;],[&#x27;Incline DB Press&#x27;,&#x27;3 x 8-10&#x27;],[&#x27;Overhead Press&#x27;,&#x27;3 x 6-8&#x27;],[&#x27;Chest Fly&#x27;,&#x27;3 x 12&#x27;],[&#x27;Lateral Raise&#x27;,&#x27;4 x 15&#x27;],[&#x27;Triceps Pushdown&#x27;,&#x27;3 x 10-12&#x27;]]},
      2:{name:&#x27;Pull&#x27;, items:[[&#x27;Romanian Deadlift (learn)&#x27;,&#x27;3 x 8&#x27;],[&#x27;Barbell Row&#x27;,&#x27;4 x 6-8&#x27;],[&#x27;Lat Pulldown&#x27;,&#x27;4 x 8-10&#x27;],[&#x27;Seated Cable Row&#x27;,&#x27;3 x 10&#x27;],[&#x27;Face Pull&#x27;,&#x27;3 x 15&#x27;],[&#x27;Hammer Curl&#x27;,&#x27;3 x 10&#x27;]]},
      3:{name:&#x27;Legs&#x27;, items:[[&#x27;Back Squat&#x27;,&#x27;4 x 5-6&#x27;],[&#x27;Leg Press&#x27;,&#x27;3 x 10&#x27;],[&#x27;Walking Lunges&#x27;,&#x27;3 x 10/leg&#x27;],[&#x27;Leg Curl&#x27;,&#x27;3 x 12&#x27;],[&#x27;Leg Extension&#x27;,&#x27;3 x 12&#x27;],[&#x27;Calves&#x27;,&#x27;4 x 15&#x27;]]},
      4:{name:&#x27;Cardio + Core&#x27;, items:[[&#x27;Zone-2 cardio&#x27;,&#x27;30-40 min&#x27;],[&#x27;Hanging Leg Raise&#x27;,&#x27;3 x 12&#x27;],[&#x27;Cable Crunch&#x27;,&#x27;3 x 15&#x27;],[&#x27;Plank&#x27;,&#x27;3 x 60 sec&#x27;]]},
      5:{name:&#x27;Upper&#x27;, items:[[&#x27;Bench Press&#x27;,&#x27;3 x 5&#x27;],[&#x27;Pull-up/Lat Pulldown&#x27;,&#x27;3 x 6-8&#x27;],[&#x27;Incline DB Press&#x27;,&#x27;3 x 10&#x27;],[&#x27;Chest Supported Row&#x27;,&#x27;3 x 10&#x27;],[&#x27;Lateral Raise&#x27;,&#x27;3 x 15&#x27;],[&#x27;EZ Curl + Skull Crusher&#x27;,&#x27;3 x 12&#x27;]]},
      6:{name:&#x27;Lower&#x27;, items:[[&#x27;Front/Hack Squat&#x27;,&#x27;3 x 8-10&#x27;],[&#x27;Romanian Deadlift&#x27;,&#x27;3 x 10&#x27;],[&#x27;Bulgarian Split Squat&#x27;,&#x27;3 x 10&#x27;],[&#x27;Leg Curl&#x27;,&#x27;3 x 15&#x27;],[&#x27;Calves&#x27;,&#x27;4 x 15&#x27;]]}
    };
    const key = &#x27;gym-tracker-tashi-v1&#x27;;
    const load = () =&gt; { try { return JSON.parse(localStorage.getItem(key)) || {attendance:{}, lifts:{}, gymTime:&#x27;18:00&#x27;}; } catch { return {attendance:{}, lifts:{}, gymTime:&#x27;18:00&#x27;}; } };
    let state = load();
    const save = () =&gt; localStorage.setItem(key, JSON.stringify(state));
    const localDate = d =&gt; { const x = d || new Date(); const off = x.getTimezoneOffset(); return new Date(x.getTime()-off*60000).toISOString().slice(0,10); };
    const today = localDate();
    const day = new Date(today + &#x27;T12:00:00&#x27;).getDay();
    const scheduled = d =&gt; d &gt;= 1 &amp;&amp; d &lt;= 6;
    const fmtDate = new Intl.DateTimeFormat(undefined,{weekday:&#x27;long&#x27;,month:&#x27;long&#x27;,day:&#x27;numeric&#x27;});
    const displayToday = new Date(today + &#x27;T12:00:00&#x27;);
    document.getElementById(&#x27;today-title&#x27;).textContent = fmtDate.format(displayToday);
    document.getElementById(&#x27;today-subtitle&#x27;).textContent = scheduled(day) ? plan[day].name + &#x27; workout&#x27; : &#x27;Rest day&#x27;;
    document.getElementById(&#x27;attendance&#x27;).checked = !!state.attendance[today];
    document.getElementById(&#x27;gym-time&#x27;).value = state.gymTime || &#x27;18:00&#x27;;

    const exerciseList = document.getElementById(&#x27;exercise-list&#x27;);
    const restNote = document.getElementById(&#x27;rest-note&#x27;);
    function renderExercises() {
      exerciseList.innerHTML = &#x27;&#x27;;
      if (!scheduled(day)) { restNote.hidden = false; return; }
      plan[day].items.forEach(([name, target]) =&gt; {
        const record = ((state.lifts[today] || {})[name] || {});
        const row = document.createElement(&#x27;div&#x27;); row.className=&#x27;exercise&#x27;;
        row.innerHTML = `&lt;div&gt;&lt;div class=&quot;exercise-name&quot;&gt;${name}&lt;/div&gt;&lt;small class=&quot;text-muted&quot;&gt;${target}&lt;/small&gt;&lt;/div&gt;&lt;label class=&quot;form-label&quot;&gt;Max weight&lt;input class=&quot;form-control weight&quot; type=&quot;number&quot; min=&quot;0&quot; step=&quot;0.5&quot; inputmode=&quot;decimal&quot; placeholder=&quot;kg&quot; value=&quot;${record.weight ?? &#x27;&#x27;}&quot; data-exercise=&quot;${name}&quot;&gt;&lt;/label&gt;&lt;label class=&quot;form-label&quot;&gt;Reps&lt;input class=&quot;form-control reps&quot; type=&quot;number&quot; min=&quot;0&quot; step=&quot;1&quot; inputmode=&quot;numeric&quot; placeholder=&quot;reps&quot; value=&quot;${record.reps ?? &#x27;&#x27;}&quot; data-exercise=&quot;${name}&quot;&gt;&lt;/label&gt;`;
        exerciseList.appendChild(row);
      });
      root.querySelectorAll(&#x27;.weight, .reps&#x27;).forEach(input =&gt; input.addEventListener(&#x27;change&#x27;, logLift));
    }
    function logLift(e) {
      const name = e.target.dataset.exercise;
      const row = e.target.closest(&#x27;.exercise&#x27;);
      const weight = Number(row.querySelector(&#x27;.weight&#x27;).value);
      const reps = Number(row.querySelector(&#x27;.reps&#x27;).value);
      state.lifts[today] ||= {};
      if (!weight &amp;&amp; !reps) delete state.lifts[today][name]; else state.lifts[today][name] = {weight, reps};
      save(); renderMe();
    }
    document.getElementById(&#x27;attendance&#x27;).addEventListener(&#x27;change&#x27;, e =&gt; { if (e.target.checked) state.attendance[today] = true; else delete state.attendance[today]; save(); renderMe(); });

    function monthDates() {
      const now = new Date(today + &#x27;T12:00:00&#x27;); const start = new Date(now.getFullYear(), now.getMonth(), 1); const end = new Date(now.getFullYear(), now.getMonth()+1, 0);
      const dates = []; for(let i=0;i&lt;start.getDay();i++) dates.push(null); for(let i=1;i&lt;=end.getDate();i++) dates.push(localDate(new Date(now.getFullYear(),now.getMonth(),i,12))); return dates;
    }
    function getStreak() { let count=0, d=new Date(today+&#x27;T12:00:00&#x27;); while(state.attendance[localDate(d)]) { count++; d.setDate(d.getDate()-1); } return count; }
    function allExercises() { return [...new Set(Object.values(plan).flatMap(x=&gt;x.items.map(i=&gt;i[0])))].sort(); }
    function renderCalendar() {
      const calendar = document.getElementById(&#x27;calendar&#x27;); calendar.innerHTML=&#x27;&#x27;;
      [&#x27;Sun&#x27;,&#x27;Mon&#x27;,&#x27;Tue&#x27;,&#x27;Wed&#x27;,&#x27;Thu&#x27;,&#x27;Fri&#x27;,&#x27;Sat&#x27;].forEach(x=&gt;{const c=document.createElement(&#x27;div&#x27;);c.className=&#x27;weekday text-small&#x27;;c.textContent=x;calendar.appendChild(c);});
      monthDates().forEach(date =&gt; { const c=document.createElement(&#x27;div&#x27;); if(!date){calendar.appendChild(c);return;} const dow=new Date(date+&#x27;T12:00:00&#x27;).getDay(); c.className=&#x27;day&#x27;+(scheduled(dow)?&#x27; scheduled&#x27;:&#x27;&#x27;)+(state.attendance[date]?&#x27; attended&#x27;:&#x27;&#x27;); c.textContent=String(Number(date.slice(-2))); c.setAttribute(&#x27;aria-label&#x27;, date+(state.attendance[date]?&#x27;, trained&#x27;:scheduled(dow)?&#x27;, planned workout&#x27;:&#x27;, rest day&#x27;)); calendar.appendChild(c); });
      document.getElementById(&#x27;month-label&#x27;).textContent = new Intl.DateTimeFormat(undefined,{month:&#x27;long&#x27;,year:&#x27;numeric&#x27;}).format(displayToday);
    }
    function renderStats() {
      const d = new Date(today+&#x27;T12:00:00&#x27;); const start=new Date(d); start.setDate(d.getDate()-((d.getDay()+6)%7)); let done=0; for(let i=0;i&lt;6;i++){const x=new Date(start);x.setDate(start.getDate()+i); if(state.attendance[localDate(x)])done++;} document.getElementById(&#x27;week-consistency&#x27;).textContent=`${done} / 6`;
      document.getElementById(&#x27;streak&#x27;).textContent=getStreak();
      const logged=Object.entries(state.lifts).flatMap(([date,lifts])=&gt;Object.entries(lifts).filter(([,v])=&gt;v.weight).map(([name,v])=&gt;({date,name,weight:v.weight}))).sort((a,b)=&gt;b.date.localeCompare(a.date));
      document.getElementById(&#x27;top-lift&#x27;).textContent=logged.length?`${logged[0].weight} kg`:&#x27;-&#x27;;
    }
    function renderSelect() { const sel=document.getElementById(&#x27;exercise-select&#x27;), current=sel.value; sel.innerHTML=&#x27;&#x27;; allExercises().forEach(name=&gt;{const o=document.createElement(&#x27;option&#x27;);o.value=name;o.textContent=name;sel.appendChild(o);}); if(current &amp;&amp; [...sel.options].some(x=&gt;x.value===current)) sel.value=current; }
    function renderChart() {
      const name=document.getElementById(&#x27;exercise-select&#x27;).value; const data=Object.entries(state.lifts).map(([date,lifts])=&gt;({date, ...(lifts[name]||{})})).filter(x=&gt;x.weight).sort((a,b)=&gt;a.date.localeCompare(b.date));
      const group=document.getElementById(&#x27;chart-content&#x27;), empty=document.getElementById(&#x27;chart-empty&#x27;); group.innerHTML=&#x27;&#x27;; empty.hidden=data.length&gt;0;
      document.getElementById(&#x27;chart-title&#x27;).textContent=`${name} weight progression`;
      document.getElementById(&#x27;chart-desc&#x27;).textContent=data.length?`${data.length} logged sessions; latest ${data[data.length-1].weight} kilograms.`:&#x27;Log weights in the Log section to see your progression.&#x27;;
      if(!data.length) return;
      const w=650,h=250,p={l:52,r:18,t:18,b:42}, min=Math.min(...data.map(x=&gt;x.weight)), max=Math.max(...data.map(x=&gt;x.weight)); const low=min===max?Math.max(0,min-5):min-(max-min)*.15, high=min===max?max+5:max+(max-min)*.15;
      const X=i=&gt;p.l+(w-p.l-p.r)*(data.length===1?.5:i/(data.length-1)); const Y=v=&gt;p.t+(h-p.t-p.b)*(1-(v-low)/(high-low));
      [low,(low+high)/2,high].forEach(v=&gt;{const y=Y(v);group.insertAdjacentHTML(&#x27;beforeend&#x27;,`&lt;line class=&quot;chart-grid&quot; x1=&quot;${p.l}&quot; x2=&quot;${w-p.r}&quot; y1=&quot;${y}&quot; y2=&quot;${y}&quot;&gt;&lt;/line&gt;&lt;text class=&quot;chart-label&quot; x=&quot;4&quot; y=&quot;${y+4}&quot;&gt;${v.toFixed(1)} kg&lt;/text&gt;`);});
      const points=data.map((x,i)=&gt;`${X(i)},${Y(x.weight)}`).join(&#x27; &#x27;); group.insertAdjacentHTML(&#x27;beforeend&#x27;,`&lt;polyline class=&quot;chart-line&quot; points=&quot;${points}&quot;&gt;&lt;/polyline&gt;`);
      data.forEach((x,i)=&gt;{const xPos=X(i), yPos=Y(x.weight), date=new Intl.DateTimeFormat(undefined,{month:&#x27;short&#x27;,day:&#x27;numeric&#x27;}).format(new Date(x.date+&#x27;T12:00:00&#x27;)); group.insertAdjacentHTML(&#x27;beforeend&#x27;,`&lt;circle class=&quot;chart-point&quot; cx=&quot;${xPos}&quot; cy=&quot;${yPos}&quot; r=&quot;4&quot;&gt;&lt;title&gt;${date}: ${x.weight} kg&lt;/title&gt;&lt;/circle&gt;&lt;text class=&quot;chart-label&quot; text-anchor=&quot;middle&quot; x=&quot;${xPos}&quot; y=&quot;${h-12}&quot;&gt;${date}&lt;/text&gt;`);});
    }
